services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bugun}
      POSTGRES_USER: ${POSTGRES_USER:-bugun}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bugun}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    env_file: .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  celery:
    build: .
    command: celery -A config worker -l info
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - web
      - redis

  celery-beat:
    build: .
    command: celery -A config beat -l info
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - web
      - redis

volumes:
  postgres_data:
