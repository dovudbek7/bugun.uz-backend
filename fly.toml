app = 'bugunuz'
primary_region = 'fra'

[processes]
  app = "gunicorn config.wsgi:application --bind 0.0.0.0:8080"
  worker = "python -m apps.telegram_bot.run"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpus = 1
  processes = ['worker']
